<!DOCTYPE html>
<!-- Music Player -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1 class="main-title">Music Player</h1>
<!--music player main container and then 2 page layout side by side, 1st music player and next playlist -->
<div class="main-container">
    <div class="player">
        <div class="album-art">
            <img src="" alt="Album Art" id="cover">
        </div>
        <div class="song-info">
            <h2 id="title">Song Title</h2>
            <p id="artist">Artist Name</p>
            <audio id="audio" src=""></audio>
        </div>
        <div class="controls">
            <button id="prev">⏮</button>
            <button id="play">▶</button>
            <button id="next">⏭</button>
        </div>
        <div class="progress-container" id="progress-container">
            <div class="progress" id="progress"></div>
        </div>
        <div class="time">
            <span id="current-time">0:00</span> / <span id="duration">0:00</span>
        </div>
        <div class="volume">
            <label for="volume">Volume</label>
            <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
        </div>
    </div>

    <div class="playlist-container">
        <h3>Playlist</h3>
        <ul id="playlist">
            <!-- Playlist items will be dynamically added here -->
           
        </ul>
    </div>
<script src="script.js"></script>
</body>
</html>
